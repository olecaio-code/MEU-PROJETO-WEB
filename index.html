<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Comercial</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --yellow:       #f5c518;
    --yellow-hover: #ffd740;
    --bg-base:      #0d0d0d;
    --bg-surface:   #141414;
    --bg-raised:    #181818;
    --bg-input:     #111111;
    --border:       #222222;
    --border-mid:   #2a2a2a;
    --border-hover: #333333;
    --text-primary: #f0ede6;
    --text-muted:   #888888;
    --text-dim:     #555555;
    --green:        #3ecf6e;
    --red:          #e24b4a;
    --font-ui:      'Syne', sans-serif;
    --font-mono:    'IBM Plex Mono', monospace;
}

body {
    font-family: var(--font-ui);
    background-color: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
}

/* ─── LOADER ─────────────────────────────── */
.loader-bar {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 2px;
    background: var(--border);
    z-index: 99999;
    display: none;
    overflow: hidden;
}
.loader-bar.active { display: block; }
.loader-bar-fill {
    height: 100%;
    background: var(--yellow);
    width: 0%;
    transition: width 1.2s ease;
}

/* ─── HEADER ─────────────────────────────── */
header {
    background: var(--bg-base);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}
.logo-mark {
    width: 28px;
    height: 28px;
    background: var(--yellow);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.logo-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.03em;
    text-transform: uppercase;
}
.logo-text span { color: var(--yellow); }

.header-right {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* ─── TABS ───────────────────────────────── */
.tabs {
    display: flex;
    overflow-x: auto;
    background: var(--bg-input);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tabs button {
    position: relative;
    flex: 0 0 auto;
    padding: 14px 20px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: color 0.2s;
}
.tabs button::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--yellow);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s;
}
.tabs button:hover { color: #c0bdb6; }
.tabs button.active { color: var(--yellow); }
.tabs button.active::after { transform: scaleX(1); }

/* ─── MAIN ───────────────────────────────── */
main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px;
}

/* ─── TAB PANELS ─────────────────────────── */
.tab-panel {
    display: none;
}
.tab-panel.active {
    display: block;
}

/* ─── PANEL ──────────────────────────────── */
.panel {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 20px;
}
.panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--bg-raised);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
}
.panel-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-primary);
}
.panel-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--yellow);
    color: var(--bg-base);
    padding: 3px 8px;
    border-radius: 3px;
    font-weight: 500;
    flex-shrink: 0;
}
.panel-header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
}

/* ─── TABLE ──────────────────────────────── */
table {
    width: 100%;
    border-collapse: collapse;
}
th {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    padding: 12px 20px;
    text-align: left;
    border-bottom: 1px solid var(--bg-raised);
    background: var(--bg-input);
}
td {
    font-size: 13px;
    color: var(--text-muted);
    padding: 12px 20px;
    border-bottom: 1px solid #1a1a1a;
    transition: background 0.15s, color 0.15s;
}
tbody tr:hover td {
    background: var(--bg-raised);
    color: var(--text-primary);
}
tbody tr:last-child td { border-bottom: none; }
td.mono, .mono {
    font-family: var(--font-mono);
    font-size: 12px;
}

/* Empty state */
tbody:empty::before {
    content: "Nenhum dado carregado ainda.";
    display: block;
    color: var(--text-dim);
    text-align: center;
    padding: 28px 20px;
    font-size: 13px;
    font-family: var(--font-mono);
}

/* ─── STATUS BADGES ──────────────────────── */
.status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
}
.status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
}
.status-ok   { background: rgba(62,207,110,0.12); color: var(--green); }
.status-warn { background: rgba(245,197,24,0.12);  color: var(--yellow); }
.status-err  { background: rgba(226,75,74,0.12);   color: var(--red); }

/* ─── BUTTONS ────────────────────────────── */
.btn-edit {
    background: transparent;
    border: 1px solid var(--border-mid);
    color: var(--text-dim);
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 5px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
}
.btn-edit:hover {
    border-color: var(--yellow);
    color: var(--yellow);
}

/* ─── REFRESH BUTTON ─────────────────────── */
.refresh-btn {
    background: var(--yellow);
    color: var(--bg-base);
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, transform 0.1s, opacity 0.2s;
}
.refresh-btn:hover { background: var(--yellow-hover); transform: scale(1.03); }
.refresh-btn:active { transform: scale(0.97); }
.refresh-btn.loading {
    pointer-events: none;
    opacity: 0.6;
    animation: pulse 0.8s infinite ease-in-out;
}
@keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.06); }
    100% { transform: scale(1); }
}
@keyframes spin-icon {
    to { transform: rotate(360deg); }
}
.refresh-btn.loading .refresh-icon {
    display: inline-block;
    animation: spin-icon 0.7s linear infinite;
}

/* ─── LAST UPDATE ────────────────────────── */
.last-update {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg-input);
    border: 1px solid var(--border-mid);
    padding: 5px 10px;
    border-radius: 4px;
}
.last-update span { color: var(--yellow); }

/* ─── TOAST ──────────────────────────────── */
.toast-success {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--yellow);
    color: var(--bg-base);
    padding: 10px 18px;
    border-radius: 4px;
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 99999;
}
.toast-success.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* ─── RESPONSIVE ─────────────────────────── */
@media (max-width: 768px) {
    header { padding: 0 16px; height: 52px; }
    .tabs  { padding: 0 16px; }
    main   { padding: 16px; }
    .tabs button { padding: 12px 14px; font-size: 11px; }
    .last-update { display: none; }
    th, td { padding: 10px 14px; }
}
</style>
</head>

<body>

<!-- Loader bar -->
<div id="loader" class="loader-bar">
    <div id="loader-fill" class="loader-bar-fill"></div>
</div>

<!-- Toast -->
<div id="toast-success" class="toast-success">Dados atualizados com sucesso</div>

<!-- Header -->
<header>
    <div class="logo">
        <div class="logo-mark">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <rect x="1"  y="7" width="3" height="6" fill="#0d0d0d"/>
                <rect x="5.5" y="4" width="3" height="9" fill="#0d0d0d"/>
                <rect x="10" y="1" width="3" height="12" fill="#0d0d0d"/>
            </svg>
        </div>
        <span class="logo-text">Dashboard <span>Comercial</span></span>
    </div>
    <div class="header-right">
        <div id="last-update" class="last-update">Atualizado: <span>nunca</span></div>
        <button id="refresh-btn" class="refresh-btn" aria-label="Atualizar dados">
            <span class="refresh-icon" aria-hidden="true">↻</span>
            Atualizar
        </button>
    </div>
</header>

<!-- Tabs -->
<div class="tabs" id="tabs-bar" role="tablist"></div>

<!-- Main content -->
<main id="app-container"></main>

<script type="module">
import { loadAllSheets, addEditButton } from "./js/sheets-api.js";
import { initTabs } from "./js/tabs.js";
import { REFRESH_INTERVAL_MS, TABS_CONFIG } from "./js/config.js";

document.addEventListener("DOMContentLoaded", () => {

    /* ── Loader ── */
    function showLoader() {
        const bar  = document.getElementById("loader");
        const fill = document.getElementById("loader-fill");
        const btn  = document.getElementById("refresh-btn");
        bar.classList.add("active");
        fill.style.width = "0%";
        btn.classList.add("loading");
        setTimeout(() => { fill.style.width = "75%"; }, 60);
    }

    function hideLoader() {
        const bar  = document.getElementById("loader");
        const fill = document.getElementById("loader-fill");
        const btn  = document.getElementById("refresh-btn");
        fill.style.width = "100%";
        setTimeout(() => {
            bar.classList.remove("active");
            fill.style.width = "0%";
            btn.classList.remove("loading");
            showToast();
        }, 400);
    }

    /* ── Toast ── */
    function showToast() {
        const toast = document.getElementById("toast-success");
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2500);
    }

    /* ── Timestamp ── */
    function updateLastRefresh() {
        const el = document.getElementById("last-update").querySelector("span");
        const now = new Date();
        el.textContent = now.toLocaleTimeString("pt-BR", {
            hour: "2-digit", minute: "2-digit", second: "2-digit"
        });
    }

    /* ── Refresh ── */
    async function refreshData() {
        showLoader();
        await loadAllSheets();
        hideLoader();
        updateLastRefresh();
    }

    /* ── Init ── */
    initTabs();
    TABS_CONFIG.forEach(tab => addEditButton(tab.id));

    showLoader();
    loadAllSheets().then(() => {
        hideLoader();
        updateLastRefresh();
    });

    document.getElementById("refresh-btn").addEventListener("click", refreshData);
    setInterval(refreshData, REFRESH_INTERVAL_MS);
});
</script>

</body>
</html>
