<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Comercial</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    color: #333;
}
header {
    background: #007bff;
    color: white;
    padding: 10px 0;
}
.tabs {
    display: flex;
    overflow-x: auto;
    background: #fff;
    border-bottom: 2px solid #007bff;
}
.tabs button {
    flex: 0 0 auto;
    padding: 15px 20px;
    border: none;
    background: #f8f9fa;
    color: #333;
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
    transition: background 0.3s;
}
.tabs button:hover {
    background: #e9ecef;
}
.tabs button.active {
    background: #007bff;
    color: white;
}
main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}
.tab-panel {
    display: none;
    background: white;
    border: 1px solid #ddd;
    border-top: none;
    padding: 20px;
    border-radius: 0 0 8px 8px;
}
.tab-panel.active {
    display: block;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}
th, td {
    border: 1px solid #ddd;
    padding: 12px;
    text-align: left;
}
th {
    background-color: #f8f9fa;
    font-weight: bold;
}
tbody:empty::before {
    content: "Nenhum dado carregado ainda.";
    display: block;
    color: #999;
    text-align: center;
    padding: 20px;
}

@media (max-width: 768px) {
    .tabs button {
        padding: 12px 15px;
        font-size: 12px;
    }
    main {
        padding: 10px;
    }
}

/* LOADER */
.loader-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}
.loader {
    width: 50px;
    height: 50px;
    border: 6px solid #ddd;
    border-top-color: #007bff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin {
    to { transform: rotate(360deg); }
}

/* BOTÃO ATUALIZAR */
.refresh-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #007bff;
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    z-index: 9000;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: transform 0.2s ease, background 0.2s ease;
}
.refresh-btn:hover {
    background: #005fcc;
    transform: scale(1.07);
}
.refresh-btn.loading {
    pointer-events: none;
    opacity: 0.7;
    animation: pulseLoading 0.8s infinite ease-in-out;
}
.last-update {
    position: fixed;
    bottom: 68px;
    right: 20px;
    font-size: 13px;
    color: #333;
    background: rgba(255,255,255,0.95);
    padding: 10px 14px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    z-index: 9000;
}
@keyframes pulseLoading {
    0% { transform: scale(1); }
    50% { transform: scale(1.10); }
    100% { transform: scale(1); }
}

/* TOAST */
.toast-success {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #28a745;
    color: #fff;
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s ease;
    z-index: 99999;
}
.toast-success.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0px);
}
</style>
</head>

<body>


<div id="loader" class="loader-overlay"><div class="loader"></div></div>
<div id="toast-success" class="toast-success">Dados atualizados com sucesso</div>
<button id="refresh-btn" class="refresh-btn">Atualizar Dados</button>
<div id="last-update" class="last-update">Última atualização: nunca</div>

<main id="app-container"></main>

<script type="module">
import { loadAllSheets, addEditButton } from "./js/sheets-api.js";
import { initTabs } from "./js/tabs.js";
import { REFRESH_INTERVAL_MS, TABS_CONFIG } from "./js/config.js";

document.addEventListener("DOMContentLoaded", () => {

    function showLoader() {
        document.getElementById("loader").style.display = "flex";
        document.getElementById("refresh-btn").classList.add("loading");
    }

    function hideLoader() {
        document.getElementById("loader").style.display = "none";
        document.getElementById("refresh-btn").classList.remove("loading");
        showToast();
    }

    function showToast() {
        const toast = document.getElementById("toast-success");
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2500);
    }

    function updateLastRefresh() {
        const lastUpdate = document.getElementById("last-update");
        const now = new Date();
        lastUpdate.textContent = `Última atualização: ${now.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}`;
    }

    async function refreshData() {
        showLoader();
        await loadAllSheets();
        hideLoader();
        updateLastRefresh();
    }

    initTabs();
    TABS_CONFIG.forEach(tab => addEditButton(tab.id));
    showLoader();
    loadAllSheets().then(() => {
        hideLoader();
        updateLastRefresh();
    });
    document.getElementById("refresh-btn").addEventListener("click", refreshData);

    setInterval(refreshData, REFRESH_INTERVAL_MS);
});
</script>

</body>
</html>
