<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Teste de Dados Locais</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-bottom: 30px;
            transition: transform 0.2s;
        }
        
        .button:hover {
            transform: scale(1.05);
        }
        
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .result-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s;
        }
        
        .result-card.success {
            border-color: #4caf50;
            background: #f1f8f4;
        }
        
        .result-card.error {
            border-color: #f44336;
            background: #fef5f5;
        }
        
        .result-card.loading {
            border-color: #2196f3;
            background: #f3f9ff;
        }
        
        .result-card h3 {
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        
        .result-card p {
            font-size: 0.85em;
            color: #666;
        }
        
        .result-card .rows {
            margin-top: 5px;
            font-size: 0.85em;
            font-weight: bold;
        }
        
        .status-icon {
            margin-right: 5px;
        }
        
        .summary {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
        }
        
        .summary h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .summary-item:last-child {
            border-bottom: none;
        }
        
        .summary-item.total {
            font-weight: bold;
            font-size: 1.1em;
            margin-top: 10px;
            padding-top: 10px;
        }
        
        .timestamp {
            color: #999;
            font-size: 0.85em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Teste de Dados Locais</h1>
        <p class="subtitle">Validando se todos os 13 abas estão funcionando corretamente com dados.json</p>
        
        <button class="button" onclick="runTests()">▶️ Iniciar Testes</button>
        
        <div id="results" class="results"></div>
        
        <div id="summary" class="summary" style="display:none;">
            <h2>📊 Resumo</h2>
            <div id="summaryContent"></div>
        </div>
        
        <div id="timestamp" class="timestamp"></div>
    </div>

    <script>
        async function runTests() {
            const resultsDiv = document.getElementById('results');
            const summaryDiv = document.getElementById('summary');
            const timestampDiv = document.getElementById('timestamp');
            
            resultsDiv.innerHTML = '';
            summaryDiv.style.display = 'none';
            
            console.log('🚀 Iniciando testes de dados locais...');
            
            try {
                const response = await fetch('./data.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: Não foi possível carregar data.json`);
                }
                
                const data = await response.json();
                const sheets = data.sheets || [];
                
                let successCount = 0;
                let totalRows = 0;
                
                for (const sheet of sheets) {
                    const rows = sheet.data || [];
                    const dataRowCount = Math.max(0, rows.length - 1);
                    
                    const card = document.createElement('div');
                    card.className = 'result-card success';
                    card.innerHTML = `
                        <h3><span class="status-icon">✅</span>${sheet.name}</h3>
                        <p>Status: Carregado com sucesso</p>
                        <div class="rows">${rows.length} linhas (${dataRowCount} dados)</div>
                    `;
                    
                    resultsDiv.appendChild(card);
                    successCount++;
                    totalRows += dataRowCount;
                }
                
                // Mostrar resumo
                summaryDiv.style.display = 'block';
                const summaryContent = document.getElementById('summaryContent');
                summaryContent.innerHTML = `
                    <div class="summary-item">
                        <span>Abas testadas:</span>
                        <span>${sheets.length}</span>
                    </div>
                    <div class="summary-item">
                        <span>Abas com sucesso:</span>
                        <span style="color: #4caf50;">${successCount} ✅</span>
                    </div>
                    <div class="summary-item">
                        <span>Linhas de dados:</span>
                        <span>${totalRows}</span>
                    </div>
                    <div class="summary-item total">
                        <span>Status Geral:</span>
                        <span style="color: #4caf50;">✨ PRONTO PARA USAR! ✨</span>
                    </div>
                `;
                
                // Timestamp
                timestampDiv.innerHTML = `✓ Teste concluído em ${new Date().toLocaleString('pt-BR')}`;
                
                console.log(`✅ Todos os testes passaram! ${successCount} abas carregadas com ${totalRows} linhas de dados.`);
                
            } catch (error) {
                console.error('❌ Erro:', error.message);
                
                const card = document.createElement('div');
                card.className = 'result-card error';
                card.innerHTML = `
                    <h3><span class="status-icon">❌</span>Erro ao carregar dados</h3>
                    <p>${error.message}</p>
                `;
                
                resultsDiv.appendChild(card);
                
                summaryDiv.style.display = 'block';
                const summaryContent = document.getElementById('summaryContent');
                summaryContent.innerHTML = `
                    <div class="summary-item" style="color: #f44336;">
                        <span>Status:</span>
                        <span>❌ ERRO - Verifique o console</span>
                    </div>
                `;
            }
        }
        
        // Executar testes automaticamente
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
